<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | SOPHISTICATED</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <div class="logo">SOPHISTICATED MOTORS</div>
        <div class="menu">
            <a href="header.html">Каталог</a>
            <a href="love.html">Избранное</a>
            <a href="newreg.html">Войти</a>
            <a href="newcarpostv2.html">✚ Разместить обьявление</a>
        </div>
    </div>

    <div class="registration-container">
        <div class="registration-card">
            <h2 class="registration-title">Регистрация</h2>
            
            <form action="#" method="post" class="registration-form" id="registrationForm">
                <div class="form-group">
                    <label for="nickname">Придумайте логин</label>
                    <input 
                        type="text" 
                        name="nickname" 
                        id="nickname" 
                        placeholder="Минимум 12 символов (буквы и цифры)"
                        class="form-input"
                    />
                    <p id="res" class="validation-message"></p>
                </div>

                <div class="form-group">
                    <label for="exampleInputEmail">Email</label>
                    <input 
                        type="email" 
                        name="exampleInputEmail" 
                        id="exampleInputEmail" 
                        placeholder="Введите ваш email"
                        class="form-input"
                    />
                </div>

                <div class="form-group">
                    <label for="exampleInputPassword1">Придумайте пароль</label>
                    <input 
                        type="pass" 
                        name="exampleInputPassword1" 
                        id="exampleInputPassword1" 
                        placeholder="Минимум 8 символов"
                        class="form-input"
                    />
                </div>

                <div class="form-group">
                    <label for="exampleInputPassword1">Подтвердите пароль</label>
                    <input 
                        type="pass" 
                        name="exampleInputConfirmPassword" 
                        id="exampleInputConfirmPassword" 
                        placeholder="Минимум 8 символов"
                        class="form-input"
                    />
                </div>


                <div class="form-checkbox">
                    <input type="checkbox" id="agreement" name="agreement">
                    <label for="agreement">Я согласен с условиями <a href="#">пользовательского соглашения</a></label>
                </div>

                <button
							type="submit"
							name="btn_reg"
							id="btn_reg"
							class="btn btn-primary"
						>
							Зарегистрироваться
						</button>
                
                <div class="login-link">
                    Уже есть аккаунт? <a href="login.html">Войдите</a>
                </div>
            </form>
        </div>
    </div>

    <div class="footer">
        © 2026 Sophisticated Motors. Все права защищены.
    </div>

    <script src="js/newscript.js"></script>
</body>
</html>
