        <div class="logo">SOPHISTICATED MOTORS</div>

            <a href="header.html">Каталог</a>

            <a href="reg.html">Войти</a>
            <a href="newcarpost.html">✚ Разместить обьявление</a>
        </div>
    </div>
    <div class="container text-center">
		<div class="container text-center">

			<h1>Форма регистрации</h1>
			<div class="container">
				<div class="row">
					<form method="post" action="" name="form_reg" id="form_reg">
						<div class="mb-3">
							<label for="nickname" class="form-label">Введите ваш никнейм</label>
							<input
								type="text"
								class="form-control"
								id="nickname"
								name="nickname"
								aria-describedby="nicknameHelp"
							/>
							<div id="nicknameHelp" class="form-text">
								Мы никогда никому не передадим ваши данные.
							</div>
						</div>
            <!-- Name -->
            <div class="mb-3">
							<label for="exampleInputName" class="form-label"
								>Введите ваше имя</label
							>
							<input
								type="name"
								class="form-control"
								id="exampleInputName"
								name="exampleInputName"
							/>
						</div>
            <!-- Famaly -->
            <div class="mb-3">
							<label for="exampleInputFamaly" class="form-label"
								>Введите вашу фамилию</label
							>
							<input
								type="famaly"
								class="form-control"
								id="exampleInputFamaly"
								name="exampleInputFamaly"
							/>
						</div>
            <!-- ote -->
            <div class="mb-3">
							<label for="exampleInputOte" class="form-label"
								> Введите ваше отчество </label
							>
							<input
								type="ote"
								class="form-control"
								id="exampleInputOte"
								name="exampleInputOte"
							/>
						</div>
            <!-- dr -->
            <div class="mb-3">
							<label for="exampleInputBirthay" class="form-label"
								> Введите вашу дату рождения в формате xx.xx.xxxx </label
							>
							<input
								type="birthay"
								class="form-control"
								id="exampleInputBirthay"
								name="exampleInputBirthay"
							/>
						</div>


            <div class="mb-3">
							<label for="exampleInputEmail" class="form-label"
								>Введите вашу почту</label
							>
							<input
								type="email"
								class="form-control"
								id="exampleInputEmail"
								name="exampleInputEmail"
							/>
						</div>



						<div class="mb-3">
							<label for="exampleInputPassword1" class="form-label"
								>Введите пароль</label
							>
							<input
								type="password"
								class="form-control"
								id="exampleInputPassword1"
								name="exampleInputPassword1"
							/>
						</div>

						<div class="mb-3 form-check">
							<input
								type="checkbox"
								class="form-check-input"
								id="exampleCheck1"
								name="exampleCheck1"
							/>
							<label class="form-check-label" for="exampleCheck1"
								>Соглашаетесь со всеми нашими условиями</label
							>
						</div>
						<button
							type="submit"
							name="btn_reg"
							id="btn_reg"
							class="btn btn-primary"
						>
							Отправить
						</button>
					</form>
				</div>
				<!-- class="row" -->
			</div>
			<!-- class="container"" -->
		</div>
		<script

			crossorigin="anonymous"
		></script>
        <!-- class="container"" -->
    </div>
