<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | AUTOP</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <div class="logo">AUTOP</div>
        <div class="menu">
            <a href="index.html">Главная</a>

            <a href="reg.html">Войти</a>
        </div>
    </div>

    <div class="registration-container">
        <div class="registration-card">
            <h2 class="registration-title">Вход</h2>
            
            <form action="#" method="post" class="registration-form" id="registrationForm">
                <div class="form-group">
                    <label for="login">Логин</label>
                    <input 
                        type="text" 
                        name="login" 
                        id="login" 
                        placeholder="Минимум 12 символов (буквы и цифры)"
                        class="form-input"
                    />
                    <p id="res" class="validation-message"></p>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input 
                        type="password" 
                        name="password" 
                        id="password" 
                        placeholder="Минимум 8 символов"
                        class="form-input"
                    />
                </div>

                <button type="submit" class="register-btn">Вход в аккаунт</button>
                
                <div class="login-link">
                    Нету аккаунта? <a href="reg.html">Зарегистрируйтесь</a>
                </div>
            </form>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2024 AUTOP. Все права защищены.</p>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
