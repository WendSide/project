<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Разместить объявление | SOPHISTICATED</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <div class="logo">SOPHISTICATED MOTORS</div>
        <div class="menu">
            <a href="header.html">Каталог</a>
            <a href="love.html">Избранное</a>
            <a href="reg.html">Войти</a>
            <a href="newcarpost.html" class="active">✚ Разместить объявление</a>
        </div>
    </div>

    <div class="registration-container">
        <div class="newcar-card">
            <h1 class="registration-title">Разместить объявление</h1>
            <p style="text-align: center; color: #666; margin-bottom: 1.5rem;">Заполните информацию об автомобиле</p>

            <form class="registration-form" id="carPostForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="mark">Марка *</label>
                        <input type="text" id="mark" name="mark" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label for="model">Модель *</label>
                        <input type="text" id="model" name="model" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label for="release">Год выпуска *</label>
                        <input type="number" id="release" name="release" class="form-input" min="1950" max="2026" required>
                    </div>

                    <div class="form-group">
                        <label for="price">Цена (₽) *</label>
                        <input type="number" id="price" name="price" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label for="mileage">Пробег (км)</label>
                        <input type="number" id="mileage" name="mileage" class="form-input">
                    </div>

                    <div class="form-group">
                        <label for="ecapacity">Объем двигателя (л)</label>
                        <input type="text" id="ecapacity" name="ecapacity" class="form-input">
                    </div>

                    <div class="form-group">
                        <label for="transmission">Коробка передач</label>
                        <select id="transmission" name="transmission" class="form-input">
                            <option value="">Выберите</option>
                            <option value="mechanical">Механика</option>
                            <option value="automatic">Автомат</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="condition">Состояние *</label>
                        <select id="condition" name="condition" class="form-input" required>
                            <option value="">Выберите</option>
                            <option value="new">Новый</option>
                            <option value="excellent">Отличное</option>
                            <option value="good">Хорошее</option>
                            <option value="fair">Среднее</option>
                            <option value="need_repair">Требует ремонта</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="numberowners">Количество владельцев</label>
                        <select id="numberowners" name="numberowners" class="form-input">
                            <option value="">Выберите</option>
                            <option value="1">1 владелец</option>
                            <option value="2">2 владельца</option>
                            <option value="3">3 владельца</option>
                            <option value="4+">4 и более</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="description">Описание</label>
                        <textarea id="description" name="description" class="form-input" rows="4"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="sity">Город *</label>
                        <input type="text" id="sity" name="sity" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label for="numberphone">Телефон *</label>
                        <input type="tel" id="numberphone" name="numberphone" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label for="owner">Ваше имя *</label>
                        <input type="text" id="owner" name="owner" class="form-input" required>
                    </div>
                </div>

                <button type="submit" class="register-btn">Опубликовать объявление</button>
                <p style="font-size: 0.8rem; color: #888; text-align: center; margin-top: 1rem;">* — обязательные поля</p>
            </form>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 Sophisticated Motors. Все права защищены.</p>
    </div>

    <script src="js/post.js"></script>
</body>
</html>
