<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Разместить объявление | SOPHISTICATED</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <div class="menu">
            <a href="header.html">Каталог</a>
            <a href="love.html">Избранное</a>
            <a href="reg.html">Войти</a>
            <a href="newcarpost.html" class="active">✚ Разместить объявление</a>
        </div>
    </div>

    <div class="registration-container">
        <div class="newcar-card">
            <h1 class="registration-title">Разместить объявление</h1>
            <p style="text-align: center; color: #666; margin-bottom: 1.5rem;">Заполните информацию об автомобиле</p>

            <form class="registration-form" action="#" method="post">
                <!-- Форма в 3 колонки -->
                <div class="form-grid"> 
                    <div class="form-group">
                        <label for="mark">Марка</label>
                        <select id="mark" name="mark" class="form-input">
                            <option value="">Выберите марку</option>
                            <option value="BMW">BMW</option>
                            <option value="Mercedes">Mercedes-Benz</option>
                            <option value="vaz">VAZ</option>
                        </select>
                        <div class="validation-message"></div>
                    </div>

                    <div class="form-group">
                        <label for="model">Модель *</label>
                        <input type="text" id="model" name="model" class="form-input" placeholder="X5, E-Class, Camry" required>
                        <div class="validation-message"></div>
                    </div>

                    <div class="form-group">
                        <label for="year">Год выпуска *</label>
                        <input type="number" id="year" name="year" class="form-input" placeholder="2020" min="1950" max="2026" required>
                        <div class="validation-message"></div>
                    </div>

                    <div class="form-group">
                        <label for="price">Цена (₽) *</label>
                        <input type="number" id="price" name="price" class="form-input" placeholder="1 500 000" required>
                        <div class="validation-message"></div>
                    </div>

                    <div class="form-group">
                        <label for="mileage">Пробег (км)</label>
                        <input type="number" id="mileage" name="mileage" class="form-input" placeholder="50 000">
                        <div class="validation-message"></div>
                    </div>

                    <div class="form-group">
                        <label for="engine">Объем двигателя (л)</label>
                        <input type="text" id="engine" name="engine" class="form-input" placeholder="2.0">
                        <div class="validation-message"></div>
                    </div>

                    <div class="form-group">
                        <label for="transmission">Коробка передач</label>
                        <select id="transmission" name="transmission" class="form-input">
                            <option value="">Выберите</option>
                            <option value="mechanical">Механика</option>
                            <option value="automatic">Автомат</option>
                        </select>
                        <div class="validation-message"></div>
                    </div>

                    <div class="form-group">
                        <label for="condition">Состояние *</label>
                        <select id="condition" name="condition" class="form-input" required>
                            <option value="">Выберите</option>
                            <option value="new">Новый</option>
                            <option value="excellent">Отличное</option>
                            <option value="good">Хорошее</option>
                            <option value="fair">Среднее</option>
                            <option value="need_repair">Требует ремонта</option>
                        </select>
                        <div class="validation-message"></div>
                    </div>

                    <div class="form-group">
                        <label for="owners">Количество владельцев</label>
                        <select id="owners" name="owners" class="form-input">
                            <option value="">Выберите</option>
                            <option value="1">1 владелец</option>
                            <option value="2">2 владельца</option>
                            <option value="3">3 владельца</option>
                            <option value="4+">4 и более</option>
                        </select>
                        <div class="validation-message"></div>
                    </div>

                    <div class="form-group full-width">
                        <label for="description">Описание объявления</label>
                        <textarea id="description" name="description" class="form-input" rows="5" placeholder="Опишите особенности автомобиля, состояние, дополнительные детали..."></textarea>
                        <div class="validation-message"></div>
                    </div> 

                    <div class="form-group">
                        <label for="city">Город *</label>
                        <input type="text" id="city" name="city" class="form-input" placeholder="Москва" required>
                        <div class="validation-message"></div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Телефон *</label>
                        <input type="tel" id="phone" name="phone" class="form-input" placeholder="+7 (999) 123-45-67" required>
                        <div class="validation-message"></div>
                    </div>

                    <div class="form-group">
                        <label for="name">Ваше имя *</label>
                        <input type="nam" id="name" name="name" class="form-input" placeholder="Игорь" required>
                        <div class="validation-message"></div>
                    </div>
                </div>

                <button type="submit" class="register-btn">Опубликовать объявление</button>
                <p style="font-size: 0.8rem; color: #888; text-align: center; margin-top: 1rem;">* — поля обязательные для заполнения</p>
            </form>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 Sophisticated Motors. Все права защищены.</p>
    </div>
</body>
</html>
